<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionale DopoScuola Online</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:15px;line-height:1.5}
.app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.topbar h1{font-size:18px;font-weight:600;color:#1a1a18;display:flex;align-items:center;gap:8px}
.logo-dot{width:10px;height:10px;border-radius:50%;background:#4F46E5;display:inline-block}
.tabs{display:flex;gap:3px;background:#e8e6e0;border-radius:10px;padding:3px}
.tab{padding:6px 16px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#6b6a65;font-family:inherit;transition:all .15s}
.tab.active{background:#fff;color:#1a1a18;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d4d2cc;background:#fff;cursor:pointer;font-size:13px;color:#1a1a18;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:#f5f4f0;border-color:#b8b6b0}
.btn.primary{background:#4F46E5;color:#fff;border-color:#4F46E5}
.btn.primary:hover{background:#4338CA}
.btn.danger{color:#991b1b;border-color:#fca5a5}
.btn.danger:hover{background:#fef2f2}
.btn.sm{padding:4px 10px;font-size:12px}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge.green{background:#dcfce7;color:#166534}
.badge.amber{background:#fef3c7;color:#92400e}
.badge.red{background:#fee2e2;color:#991b1b}
.badge.blue{background:#dbeafe;color:#1e40af}
.badge.gray{background:#f1f0ec;color:#57564f}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:500px){.grid2,.grid3{grid-template-columns:1fr}}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#6b6a65;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid #d4d2cc;border-radius:8px;font-size:13px;background:#fff;color:#1a1a18;font-family:inherit;outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#4F46E5}
.field textarea{resize:vertical;min-height:60px}
.section-title{font-size:11px;font-weight:600;color:#9b9a94;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px}
.student-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f1f0ec;cursor:pointer;transition:background .1s}
.student-row:last-child{border-bottom:none}
.student-row:hover{background:#fafaf8;margin:0 -1.25rem;padding:11px 1.25rem;border-radius:0}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.av-0{background:#ede9fe;color:#5b21b6}
.av-1{background:#d1fae5;color:#065f46}
.av-2{background:#dbeafe;color:#1e40af}
.av-3{background:#fce7f3;color:#9d174d}
.av-4{background:#fff7ed;color:#9a3412}
.student-name{font-size:14px;font-weight:500}
.student-meta{font-size:12px;color:#9b9a94}
.metric-card{background:#fafaf8;border:1px solid #e8e6e0;border-radius:10px;padding:12px 16px}
.metric-label{font-size:12px;color:#9b9a94;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600;color:#1a1a18}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;z-index:1000;overflow-y:auto}
.modal{background:#fff;border-radius:14px;border:1px solid #e8e6e0;width:100%;max-width:560px;padding:1.5rem;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid #f1f0ec}
.pag-row,.lez-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f1f0ec;font-size:13px;flex-wrap:wrap}
.pag-row:last-child,.lez-row:last-child{border-bottom:none}
.detail-back{background:none;border:none;cursor:pointer;color:#9b9a94;font-size:13px;display:flex;align-items:center;gap:4px;font-family:inherit;padding:0;margin-bottom:1rem}
.detail-back:hover{color:#1a1a18}
.search-wrap{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.search-wrap input{flex:1;min-width:180px;padding:8px 10px;border:1px solid #d4d2cc;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.search-wrap input:focus{border-color:#4F46E5}
.empty{text-align:center;padding:2rem;color:#9b9a94;font-size:14px}
.divider-label{font-size:12px;font-weight:600;color:#9b9a94;padding:8px 0 4px;border-top:1px solid #f1f0ec;margin-top:4px}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1><span class="logo-dot"></span> Gestionale DopoScuola</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('studenti')">Studenti</button>
    <button class="tab" onclick="switchTab('pagamenti')">Pagamenti</button>
    <button class="tab" onclick="switchTab('lezioni')">Lezioni</button>
  </div>
</div>

<div id="tab-studenti">
  <div id="view-lista">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Cerca per nome o cognome..." oninput="renderLista()">
      <select id="filtro-stato-stud" onchange="renderLista()" style="padding:8px 10px;border:1px solid #d4d2cc;border-radius:8px;font-size:13px;font-family:inherit;outline:none">
        <option value="">Tutti</option>
        <option value="1">Attivi</option>
        <option value="0">Inattivi</option>
      </select>
      <button class="btn primary" onclick="openModal('nuovo-studente')"><i class="ti ti-plus"></i> Nuovo studente</button>
    </div>
    <div class="grid3" style="margin-bottom:1.25rem">
      <div class="metric-card"><div class="metric-label">Studenti totali</div><div class="metric-value" id="m-totale">0</div></div>
      <div class="metric-card"><div class="metric-label">Attivi</div><div class="metric-value" id="m-attivi">0</div></div>
      <div class="metric-card"><div class="metric-label">Entrate mensili stimate</div><div class="metric-value" id="m-entrate">€0</div></div>
    </div>
    <div class="card" style="padding:0 1.25rem"><div id="lista-studenti"></div></div>
  </div>
  <div id="view-dettaglio" style="display:none">
    <button class="detail-back" onclick="backToLista()"><i class="ti ti-arrow-left"></i> Tutti gli studenti</button>
    <div id="dettaglio-content"></div>
  </div>
</div>

<div id="tab-pagamenti" style="display:none">
  <div class="search-wrap">
    <select id="filtro-mese" onchange="renderPagamenti()" style="padding:8px 10px;border:1px solid #d4d2cc;border-radius:8px;font-size:13px;font-family:inherit;outline:none"></select>
    <select id="filtro-stato-pag" onchange="renderPagamenti()" style="padding:8px 10px;border:1px solid #d4d2cc;border-radius:8px;font-size:13px;font-family:inherit;outline:none">
      <option value="">Tutti</option><option value="Pagato">Pagati</option><option value="In attesa">In attesa</option>
    </select>
    <button class="btn primary" onclick="openModal('nuovo-pagamento')"><i class="ti ti-plus"></i> Registra pagamento</button>
  </div>
  <div class="grid3" style="margin-bottom:1.25rem">
    <div class="metric-card"><div class="metric-label">Incassato</div><div class="metric-value" id="p-incassato">€0</div></div>
    <div class="metric-card"><div class="metric-label">Da incassare</div><div class="metric-value" id="p-da-incassare">€0</div></div>
    <div class="metric-card"><div class="metric-label">Studenti paganti</div><div class="metric-value" id="p-paganti">0</div></div>
  </div>
  <div class="card" style="padding:0 1.25rem"><div id="lista-pagamenti"></div></div>
</div>

<div id="tab-lezioni" style="display:none">
  <div class="search-wrap">
    <select id="filtro-studente-lez" onchange="renderLezioni()" style="padding:8px 10px;border:1px solid #d4d2cc;border-radius:8px;font-size:13px;font-family:inherit;outline:none;flex:1">
      <option value="">Tutti gli studenti</option>
    </select>
    <input type="month" id="filtro-mese-lez" onchange="renderLezioni()" style="padding:8px 10px;border:1px solid #d4d2cc;border-radius:8px;font-size:13px;font-family:inherit;outline:none">
    <button class="btn primary" onclick="openModal('nuova-lezione')"><i class="ti ti-plus"></i> Aggiungi lezione</button>
  </div>
  <div class="card" style="padding:0 1.25rem"><div id="lista-lezioni"></div></div>
</div>
</div>

<div id="modal-container"></div>

<script>
const PIANI=[
  {id:'5g',label:'5 giorni — 10h/sett',prezzo:220},
  {id:'4g',label:'4 giorni — 8h/sett',prezzo:180},
  {id:'3g',label:'3 giorni — 6h/sett',prezzo:135},
  {id:'2g',label:'2 giorni — 4h/sett',prezzo:90},
  {id:'ind',label:'Solo lezioni individuali',prezzo:0},
];
const METODI=['Bonifico','PayPal','Postepay'];
const MATERIE=['Matematica','Fisica','Italiano','Latino','Greco','Inglese','Tedesco','Francese','Spagnolo','Storia','Geografia','Filosofia','Scienze','Chimica','Biologia','Diritto','Economia','Informatica'];
const STATI_LEZ=['Tenuta','Da confermare','Assente'];
const DOCENTI=['Di Bartolo Sofia','Di Gesualdo Elena','Donati Graziano','Famoso Stefano','Irlando Daria','La Rosa Federica','Muto Marilena','Parisi Marco','Polito Rita','Spanu Claudia','Stano Alessandra'];

let db={studenti:[],pagamenti:[],lezioni:[],nextId:1};

function loadDb(){
  try{const r=localStorage.getItem('doposcuola-db');if(r)db=JSON.parse(r);}catch(e){}
  initMesi();
  const now=new Date();
  const mi=document.getElementById('filtro-mese-lez');
  if(mi)mi.value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  renderAll();
}

function saveDb(){
  try{localStorage.setItem('doposcuola-db',JSON.stringify(db));}catch(e){}
}

function renderAll(){
  renderLista();renderPagamenti();renderLezioni();updateFiltroStudente();updateMetrics();
}

function initMesi(){
  const sel=document.getElementById('filtro-mese');
  if(!sel)return;
  const mesi=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const now=new Date();sel.innerHTML='';
  for(let i=-3;i<=4;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const val=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const opt=document.createElement('option');
    opt.value=val;opt.textContent=`${mesi[d.getMonth()]} ${d.getFullYear()}`;
    if(i===0)opt.selected=true;
    sel.appendChild(opt);
  }
}

function initials(n,c){return((n||'')[0]||'').toUpperCase()+((c||'')[0]||'').toUpperCase();}
function avColor(id){return'av-'+(id%5);}

function updateMetrics(){
  const attivi=db.studenti.filter(s=>s.attivo!==false);
  document.getElementById('m-totale').textContent=db.studenti.length;
  document.getElementById('m-attivi').textContent=attivi.length;
  const ent=attivi.reduce((a,s)=>{const p=PIANI.find(x=>x.id===s.piano);return a+(p&&p.prezzo>0?p.prezzo:0);},0);
  document.getElementById('m-entrate').textContent='€'+ent;
}

function renderLista(){
  const q=(document.getElementById('search-input')||{}).value||'';
  const fs=(document.getElementById('filtro-stato-stud')||{}).value||'';
  const lista=document.getElementById('lista-studenti');
  if(!lista)return;
  let arr=db.studenti.filter(s=>{
    const full=(s.nome+' '+s.cognome).toLowerCase();
    const matchQ=full.includes(q.toLowerCase());
    const matchS=fs===''||String(s.attivo!==false?1:0)===fs;
    return matchQ&&matchS;
  });
  if(!arr.length){lista.innerHTML='<div class="empty">Nessuno studente trovato</div>';updateMetrics();return;}
  lista.innerHTML=arr.map(s=>{
    const p=PIANI.find(x=>x.id===s.piano);
    const stato=s.attivo===false?'<span class="badge gray">Inattivo</span>':'<span class="badge green">Attivo</span>';
    return`<div class="student-row" onclick="apriDettaglio(${s.id})">
      <div class="avatar ${avColor(s.id)}">${initials(s.nome,s.cognome)}</div>
      <div style="flex:1;min-width:0">
        <div class="student-name">${s.nome} ${s.cognome}</div>
        <div class="student-meta">${p?p.label:'—'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">${stato}<i class="ti ti-chevron-right" style="color:#9b9a94;font-size:16px"></i></div>
    </div>`;
  }).join('');
  updateMetrics();
}

function apriDettaglio(id){
  const s=db.studenti.find(x=>x.id===id);
  if(!s)return;
  document.getElementById('view-lista').style.display='none';
  document.getElementById('view-dettaglio').style.display='block';
  const p=PIANI.find(x=>x.id===s.piano);
  const lezioni=db.lezioni.filter(l=>l.studenteId===id).slice().sort((a,b)=>b.data.localeCompare(a.data));
  const pagamenti=db.pagamenti.filter(x=>x.studenteId===id).slice().reverse();
  const totOre=lezioni.filter(l=>l.stato==='Tenuta').reduce((a,l)=>a+(l.durata||1),0);

  const lezHtml=lezioni.length?lezioni.slice(0,15).map(l=>`
    <div class="lez-row">
      <span style="color:#9b9a94;min-width:88px;font-size:12px">${l.data}</span>
      <span style="flex:1">${l.materia}</span>
      <span style="color:#9b9a94;font-size:12px">${l.docente||'—'}</span>
      <span style="color:#9b9a94;font-size:12px">${l.orario||''}</span>
      <span class="badge ${l.stato==='Tenuta'?'green':l.stato==='Assente'?'red':'amber'}">${l.stato}</span>
      <button class="btn danger sm" onclick="event.stopPropagation();eliminaLezione(${l.id},${id})"><i class="ti ti-trash"></i></button>
    </div>`).join(''):'<div class="empty">Nessuna lezione registrata</div>';

  const pagHtml=pagamenti.length?pagamenti.slice(0,8).map(pg=>`
    <div class="pag-row">
      <span style="color:#9b9a94;min-width:88px;font-size:12px">${pg.mese}</span>
      <span style="flex:1">${pg.metodo}</span>
      <span style="font-weight:600">€${pg.importo}</span>
      <span class="badge ${pg.stato==='Pagato'?'green':'red'}">${pg.stato}</span>
      <button class="btn danger sm" onclick="event.stopPropagation();eliminaPagamento(${pg.id},${id})"><i class="ti ti-trash"></i></button>
    </div>`).join(''):'<div class="empty">Nessun pagamento registrato</div>';

  document.getElementById('dettaglio-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap">
      <div class="avatar ${avColor(s.id)}" style="width:48px;height:48px;font-size:16px">${initials(s.nome,s.cognome)}</div>
      <div style="flex:1">
        <div style="font-size:20px;font-weight:600">${s.nome} ${s.cognome}</div>
        <div style="font-size:13px;color:#9b9a94">${p?p.label:'—'} · ${s.attivo===false?'<span class="badge gray">Inattivo</span>':'<span class="badge green">Attivo</span>'}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="openModal('modifica-studente',${s.id})"><i class="ti ti-edit"></i> Modifica</button>
        <button class="btn danger" onclick="eliminaStudente(${s.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    <div class="grid3" style="margin-bottom:1.25rem">
      <div class="metric-card"><div class="metric-label">Ore totali tenute</div><div class="metric-value">${totOre}h</div></div>
      <div class="metric-card"><div class="metric-label">Canone mensile</div><div class="metric-value">${p&&p.prezzo>0?'€'+p.prezzo:'a lezione'}</div></div>
      <div class="metric-card"><div class="metric-label">Lezioni totali</div><div class="metric-value">${lezioni.length}</div></div>
    </div>
    <div class="card">
      <div class="section-title" style="margin-top:0">Anagrafica studente</div>
      <div class="grid2">
        <div><div class="metric-label">Email</div><div style="font-size:13px;margin-top:2px">${s.email||'—'}</div></div>
        <div><div class="metric-label">Telefono</div><div style="font-size:13px;margin-top:2px">${s.telefono||'—'}</div></div>
        <div><div class="metric-label">Data di nascita</div><div style="font-size:13px;margin-top:2px">${s.dataNascita||'—'}</div></div>
        <div><div class="metric-label">Codice fiscale</div><div style="font-size:13px;margin-top:2px">${s.cf||'—'}</div></div>
        <div><div class="metric-label">Indirizzo</div><div style="font-size:13px;margin-top:2px">${s.indirizzo||'—'}</div></div>
        <div><div class="metric-label">Data iscrizione</div><div style="font-size:13px;margin-top:2px">${s.dataIscrizione||'—'}</div></div>
      </div>
      <div class="section-title">Genitore / tutore</div>
      <div class="grid2">
        <div><div class="metric-label">Nome tutore</div><div style="font-size:13px;margin-top:2px">${s.tutoreNome||'—'}</div></div>
        <div><div class="metric-label">CF tutore (per ricevute)</div><div style="font-size:13px;margin-top:2px;font-family:monospace">${s.tutoreCf||'—'}</div></div>
        <div><div class="metric-label">Email tutore</div><div style="font-size:13px;margin-top:2px">${s.tutoreEmail||'—'}</div></div>
        <div><div class="metric-label">Telefono tutore</div><div style="font-size:13px;margin-top:2px">${s.tutoreTel||'—'}</div></div>
      </div>
      ${s.note?`<div class="section-title">Note</div><div style="font-size:13px;color:#6b6a65;background:#fafaf8;border-radius:8px;padding:10px">${s.note}</div>`:''}
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="section-title" style="margin:0">Lezioni</div>
        <button class="btn sm" onclick="openModal('nuova-lezione',${s.id})"><i class="ti ti-plus"></i> Aggiungi</button>
      </div>
      ${lezHtml}
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="section-title" style="margin:0">Pagamenti</div>
        <button class="btn sm" onclick="openModal('nuovo-pagamento',${s.id})"><i class="ti ti-plus"></i> Registra</button>
      </div>
      ${pagHtml}
    </div>`;
}

function backToLista(){
  document.getElementById('view-lista').style.display='block';
  document.getElementById('view-dettaglio').style.display='none';
  renderLista();
}

function renderPagamenti(){
  const mese=(document.getElementById('filtro-mese')||{}).value||'';
  const stato=(document.getElementById('filtro-stato-pag')||{}).value||'';
  const lista=document.getElementById('lista-pagamenti');
  if(!lista)return;
  let arr=db.pagamenti.filter(p=>{
    const mM=!mese||p.mese===mese;
    const mS=!stato||p.stato===stato;
    return mM&&mS;
  }).slice().reverse();
  const inc=arr.filter(p=>p.stato==='Pagato').reduce((a,p)=>a+Number(p.importo),0);
  const da=arr.filter(p=>p.stato!=='Pagato').reduce((a,p)=>a+Number(p.importo),0);
  const pg=new Set(arr.filter(p=>p.stato==='Pagato').map(p=>p.studenteId)).size;
  document.getElementById('p-incassato').textContent='€'+inc;
  document.getElementById('p-da-incassare').textContent='€'+da;
  document.getElementById('p-paganti').textContent=pg;
  if(!arr.length){lista.innerHTML='<div class="empty">Nessun pagamento trovato</div>';return;}
  lista.innerHTML=arr.map(p=>{
    const s=db.studenti.find(x=>x.id===p.studenteId);
    return`<div class="pag-row">
      <div class="avatar ${avColor(p.studenteId)}" style="width:28px;height:28px;font-size:11px;flex-shrink:0">${s?initials(s.nome,s.cognome):'?'}</div>
      <span style="flex:1">${s?s.nome+' '+s.cognome:'Studente rimosso'}</span>
      <span style="color:#9b9a94;font-size:12px">${p.mese}</span>
      <span style="color:#9b9a94;font-size:12px">${p.metodo}</span>
      <span style="font-weight:600">€${p.importo}</span>
      <span class="badge ${p.stato==='Pagato'?'green':'red'}">${p.stato}</span>
      <button class="btn danger sm" onclick="eliminaPagamento(${p.id},null)"><i class="ti ti-trash"></i></button>
    </div>`;
  }).join('');
}

function renderLezioni(){
  const stId=Number((document.getElementById('filtro-studente-lez')||{}).value)||null;
  const mese=(document.getElementById('filtro-mese-lez')||{}).value||'';
  const lista=document.getElementById('lista-lezioni');
  if(!lista)return;
  let arr=db.lezioni.filter(l=>{
    const mS=!stId||l.studenteId===stId;
    const mM=!mese||l.data.startsWith(mese);
    return mS&&mM;
  }).slice().sort((a,b)=>b.data.localeCompare(a.data));
  if(!arr.length){lista.innerHTML='<div class="empty">Nessuna lezione trovata</div>';return;}
  lista.innerHTML=arr.map(l=>{
    const s=db.studenti.find(x=>x.id===l.studenteId);
    return`<div class="lez-row">
      <span style="color:#9b9a94;min-width:88px;font-size:12px">${l.data}</span>
      <span style="flex:1;font-weight:500">${s?s.nome+' '+s.cognome:'—'}</span>
      <span style="color:#9b9a94;font-size:12px">${l.materia}</span>
      <span style="color:#9b9a94;font-size:12px">${l.docente||'—'}</span>
      <span style="color:#9b9a94;font-size:12px">${l.orario||''}</span>
      <span class="badge ${l.stato==='Tenuta'?'green':l.stato==='Assente'?'red':'amber'}">${l.stato}</span>
      <button class="btn danger sm" onclick="eliminaLezione(${l.id},null)"><i class="ti ti-trash"></i></button>
    </div>`;
  }).join('');
}

function updateFiltroStudente(){
  const sel=document.getElementById('filtro-studente-lez');
  if(!sel)return;
  const cur=sel.value;
  sel.innerHTML='<option value="">Tutti gli studenti</option>'+db.studenti.map(s=>`<option value="${s.id}">${s.nome} ${s.cognome}</option>`).join('');
  if(cur)sel.value=cur;
}

function pianiOpt(selected){return PIANI.map(p=>`<option value="${p.id}"${selected===p.id?' selected':''}>${p.label}${p.prezzo>0?' — €'+p.prezzo+'/mese':' — €18/lez'}</option>`).join('');}

function openModal(tipo,arg){
  const mc=document.getElementById('modal-container');
  let html='';
  if(tipo==='nuovo-studente'||tipo==='modifica-studente'){
    const s=tipo==='modifica-studente'?db.studenti.find(x=>x.id===arg):null;
    html=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
      <h2>${s?'Modifica studente':'Nuovo studente'}</h2>
      <div class="section-title" style="margin-top:0">Dati personali</div>
      <div class="grid2">
        <div class="field"><label>Nome *</label><input id="f-nome" value="${s?s.nome:''}" placeholder="Nome"></div>
        <div class="field"><label>Cognome *</label><input id="f-cognome" value="${s?s.cognome:''}" placeholder="Cognome"></div>
        <div class="field"><label>Email</label><input id="f-email" value="${s?s.email||'':''}" placeholder="email@esempio.it"></div>
        <div class="field"><label>Telefono</label><input id="f-tel" value="${s?s.telefono||'':''}" placeholder="+39..."></div>
        <div class="field"><label>Data di nascita</label><input id="f-nascita" type="date" value="${s?s.dataNascita||'':''}"></div>
        <div class="field"><label>Codice fiscale</label><input id="f-cf" value="${s?s.cf||'':''}" placeholder="RSSMRA80A01H501Z"></div>
        <div class="field"><label>Indirizzo</label><input id="f-indirizzo" value="${s?s.indirizzo||'':''}" placeholder="Via, città"></div>
        <div class="field"><label>Data iscrizione</label><input id="f-iscrizione" type="date" value="${s?s.dataIscrizione||'':''}"></div>
      </div>
      <div class="section-title">Genitore / tutore</div>
      <div class="grid2">
        <div class="field"><label>Nome tutore</label><input id="f-tnome" value="${s?s.tutoreNome||'':''}" placeholder="Nome e cognome"></div>
        <div class="field"><label>CF tutore (per ricevute)</label><input id="f-tcf" value="${s?s.tutoreCf||'':''}" placeholder="Codice fiscale"></div>
        <div class="field"><label>Email tutore</label><input id="f-temail" value="${s?s.tutoreEmail||'':''}" placeholder="email tutore"></div>
        <div class="field"><label>Telefono tutore</label><input id="f-ttel" value="${s?s.tutoreTel||'':''}" placeholder="+39..."></div>
      </div>
      <div class="section-title">Piano tariffario e stato</div>
      <div class="grid2">
        <div class="field"><label>Piano</label><select id="f-piano">${pianiOpt(s?s.piano:'5g')}</select></div>
        <div class="field"><label>Stato</label><select id="f-attivo"><option value="1"${!s||s.attivo!==false?' selected':''}>Attivo</option><option value="0"${s&&s.attivo===false?' selected':''}>Inattivo</option></select></div>
      </div>
      <div class="field"><label>Note</label><textarea id="f-note" placeholder="Preferenze docente, note particolari...">${s?s.note||'':''}</textarea></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Annulla</button>
        <button class="btn primary" onclick="salvaStudente(${s?s.id:'null'})">${s?'Salva modifiche':'Aggiungi'}</button>
      </div>
    </div></div>`;
  } else if(tipo==='nuovo-pagamento'){
    const studOpt=db.studenti.map(s=>`<option value="${s.id}"${arg===s.id?' selected':''}>${s.nome} ${s.cognome}</option>`).join('');
    const meseOpts=(()=>{const mesi=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];const now=new Date();let o='';for(let i=-3;i<=4;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);const v=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;o+=`<option value="${v}"${i===0?' selected':''}>${mesi[d.getMonth()]} ${d.getFullYear()}</option>`;}return o;})();
    const importoDefault=arg?(()=>{const s=db.studenti.find(x=>x.id===arg);if(!s)return'';const p=PIANI.find(x=>x.id===s.piano);return p&&p.prezzo>0?p.prezzo:'';})():'';
    html=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
      <h2>Registra pagamento</h2>
      <div class="field"><label>Studente *</label><select id="p-studente" onchange="autoImporto()">${studOpt}</select></div>
      <div class="grid2">
        <div class="field"><label>Mese di riferimento</label><select id="p-mese">${meseOpts}</select></div>
        <div class="field"><label>Importo (€) *</label><input id="p-importo" type="number" placeholder="220" min="0" value="${importoDefault}"></div>
        <div class="field"><label>Metodo di pagamento</label><select id="p-metodo">${METODI.map(m=>`<option>${m}</option>`).join('')}</select></div>
        <div class="field"><label>Stato</label><select id="p-stato"><option>Pagato</option><option>In attesa</option></select></div>
      </div>
      <div class="field"><label>Note</label><input id="p-note" placeholder="Facoltativo"></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Annulla</button>
        <button class="btn primary" onclick="salvaPagamento()">Registra</button>
      </div>
    </div></div>`;
  } else if(tipo==='nuova-lezione'){
    const studOpt=db.studenti.map(s=>`<option value="${s.id}"${arg===s.id?' selected':''}>${s.nome} ${s.cognome}</option>`).join('');
    html=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
      <h2>Aggiungi lezione</h2>
      <div class="field"><label>Studente *</label><select id="l-studente">${studOpt}</select></div>
      <div class="grid2">
        <div class="field"><label>Data *</label><input id="l-data" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
        <div class="field"><label>Orario</label><input id="l-orario" placeholder="17:00 - 18:00"></div>
        <div class="field"><label>Materia *</label><select id="l-materia">${MATERIE.map(m=>`<option>${m}</option>`).join('')}</select></div>
        <div class="field"><label>Docente</label><select id="l-docente">${DOCENTI.map(d=>`<option>${d}</option>`).join('')}</select></div>
        <div class="field"><label>Durata (ore)</label><input id="l-durata" type="number" value="1" min="0.5" step="0.5"></div>
        <div class="field"><label>Stato</label><select id="l-stato">${STATI_LEZ.map(s=>`<option>${s}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Note / argomenti trattati</label><textarea id="l-note" placeholder="Es: equazioni di secondo grado, teoria del moto..."></textarea></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Annulla</button>
        <button class="btn primary" onclick="salvaLezione()">Aggiungi</button>
      </div>
    </div></div>`;
  }
  mc.innerHTML=html;
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

function autoImporto(){
  const sel=document.getElementById('p-studente');
  const imp=document.getElementById('p-importo');
  if(!sel||!imp)return;
  const s=db.studenti.find(x=>x.id===Number(sel.value));
  if(!s)return;
  const p=PIANI.find(x=>x.id===s.piano);
  if(p&&p.prezzo>0)imp.value=p.prezzo;
}

function salvaStudente(id){
  const nome=document.getElementById('f-nome').value.trim();
  const cognome=document.getElementById('f-cognome').value.trim();
  if(!nome||!cognome){alert('Nome e cognome sono obbligatori');return;}
  const data={nome,cognome,
    email:document.getElementById('f-email').value.trim(),
    telefono:document.getElementById('f-tel').value.trim(),
    dataNascita:document.getElementById('f-nascita').value,
    cf:document.getElementById('f-cf').value.trim().toUpperCase(),
    indirizzo:document.getElementById('f-indirizzo').value.trim(),
    dataIscrizione:document.getElementById('f-iscrizione').value,
    tutoreNome:document.getElementById('f-tnome').value.trim(),
    tutoreCf:document.getElementById('f-tcf').value.trim().toUpperCase(),
    tutoreEmail:document.getElementById('f-temail').value.trim(),
    tutoreTel:document.getElementById('f-ttel').value.trim(),
    piano:document.getElementById('f-piano').value,
    attivo:document.getElementById('f-attivo').value==='1',
    note:document.getElementById('f-note').value.trim(),
  };
  if(id!==null&&id!==undefined&&!isNaN(id)){
    const i=db.studenti.findIndex(s=>s.id===id);
    if(i>=0)db.studenti[i]={...db.studenti[i],...data};
    saveDb();closeModal();renderAll();apriDettaglio(id);
  } else {
    data.id=db.nextId++;
    db.studenti.push(data);
    saveDb();closeModal();renderAll();
  }
}

function salvaPagamento(){
  const stId=Number(document.getElementById('p-studente').value);
  const importo=Number(document.getElementById('p-importo').value);
  if(!stId||!importo){alert('Seleziona uno studente e inserisci l\'importo');return;}
  db.pagamenti.push({id:db.nextId++,studenteId:stId,
    mese:document.getElementById('p-mese').value,
    importo,metodo:document.getElementById('p-metodo').value,
    stato:document.getElementById('p-stato').value,
    note:document.getElementById('p-note').value.trim(),
  });
  saveDb();closeModal();renderAll();
}

function salvaLezione(){
  const stId=Number(document.getElementById('l-studente').value);
  const data=document.getElementById('l-data').value;
  const materia=document.getElementById('l-materia').value;
  if(!stId||!data||!materia){alert('Compila i campi obbligatori');return;}
  db.lezioni.push({id:db.nextId++,studenteId:stId,data,
    orario:document.getElementById('l-orario').value.trim(),
    materia,docente:document.getElementById('l-docente').value,
    durata:Number(document.getElementById('l-durata').value)||1,
    stato:document.getElementById('l-stato').value,
    note:document.getElementById('l-note').value.trim(),
  });
  saveDb();closeModal();renderAll();
}

function eliminaStudente(id){
  if(!confirm('Eliminare questo studente e tutti i suoi dati?'))return;
  db.studenti=db.studenti.filter(s=>s.id!==id);
  db.pagamenti=db.pagamenti.filter(p=>p.studenteId!==id);
  db.lezioni=db.lezioni.filter(l=>l.studenteId!==id);
  saveDb();backToLista();
}

function eliminaPagamento(id,studenteId){
  if(!confirm('Eliminare questo pagamento?'))return;
  db.pagamenti=db.pagamenti.filter(p=>p.id!==id);
  saveDb();
  if(studenteId)apriDettaglio(studenteId);else renderPagamenti();
}

function eliminaLezione(id,studenteId){
  if(!confirm('Eliminare questa lezione?'))return;
  db.lezioni=db.lezioni.filter(l=>l.id!==id);
  saveDb();
  if(studenteId)apriDettaglio(studenteId);else renderLezioni();
}

function switchTab(t){
  ['studenti','pagamenti','lezioni'].forEach(x=>{
    document.getElementById('tab-'+x).style.display=x===t?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['studenti','pagamenti','lezioni'][i]===t);
  });
  if(t==='pagamenti')renderPagamenti();
  if(t==='lezioni'){renderLezioni();updateFiltroStudente();}
}

loadDb();
</script>
</body>
</html>
