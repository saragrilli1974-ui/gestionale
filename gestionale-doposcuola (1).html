<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionale DopoScuola Online</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:15px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.topbar h1{font-size:18px;font-weight:600;color:#1a1a18;display:flex;align-items:center;gap:8px}
.logo-dot{width:10px;height:10px;border-radius:50%;background:#4F46E5;display:inline-block}
.tabs{display:flex;gap:3px;background:#e8e6e0;border-radius:10px;padding:3px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#6b6a65;font-family:inherit;transition:all .15s}
.tab.active{background:#fff;color:#1a1a18;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d4d2cc;background:#fff;cursor:pointer;font-size:13px;color:#1a1a18;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:#f5f4f0;border-color:#b8b6b0}
.btn.primary{background:#4F46E5;color:#fff;border-color:#4F46E5}
.btn.primary:hover{background:#4338CA}
.btn.success{background:#16a34a;color:#fff;border-color:#16a34a}
.btn.success:hover{background:#15803d}
.btn.danger{color:#991b1b;border-color:#fca5a5}
.btn.danger:hover{background:#fef2f2}
.btn.sm{padding:4px 10px;font-size:12px}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge.green{background:#dcfce7;color:#166534}
.badge.amber{background:#fef3c7;color:#92400e}
.badge.red{background:#fee2e2;color:#991b1b}
.badge.blue{background:#dbeafe;color:#1e40af}
.badge.gray{background:#f1f0ec;color:#57564f}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#6b6a65;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid #d4d2cc;border-radius:8px;font-size:13px;background:#fff;color:#1a1a18;font-family:inherit;outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#4F46E5}
.field textarea{resize:vertical;min-height:60px}
.section-title{font-size:11px;font-weight:600;color:#9b9a94;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px}
.row-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f1f0ec;cursor:pointer;transition:background .1s}
.row-item:last-child{border-bottom:none}
.row-item:hover{background:#fafaf8;margin:0 -1.25rem;padding:11px 1.25rem}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.av-0{background:#ede9fe;color:#5b21b6}
.av-1{background:#d1fae5;color:#065f46}
.av-2{background:#dbeafe;color:#1e40af}
.av-3{background:#fce7f3;color:#9d174d}
.av-4{background:#fff7ed;color:#9a3412}
.metric-card{background:#fafaf8;border:1px solid #e8e6e0;border-radius:10px;padding:12px 16px}
.metric-label{font-size:12px;color:#9b9a94;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600;color:#1a1a18}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;z-index:1000;overflow-y:auto}
.modal{background:#fff;border-radius:14px;border:1px solid #e8e6e0;width:100%;max-width:580px;padding:1.5rem;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid #f1f0ec}
.pag-row,.lez-row,.slot-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f1f0ec;font-size:13px;flex-wrap:wrap}
.pag-row:last-child,.lez-row:last-child,.slot-row:last-child{border-bottom:none}
.detail-back{background:none;border:none;cursor:pointer;color:#9b9a94;font-size:13px;display:flex;align-items:center;gap:4px;font-family:inherit;padding:0;margin-bottom:1rem}
.detail-back:hover{color:#1a1a18}
.search-wrap{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.search-wrap input,.search-wrap select{padding:8px 10px;border:1px solid #d4d2cc;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.search-wrap input{flex:1;min-width:180px}
.empty{text-align:center;padding:2rem;color:#9b9a94;font-size:14px}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.week-label{font-size:15px;font-weight:600;flex:1}
.slot-chip{background:#ede9fe;color:#5b21b6;border-radius:4px;padding:2px 6px;font-size:11px;margin:1px;display:inline-flex;align-items:center;gap:3px;cursor:pointer}
.slot-chip:hover{background:#ddd6fe}
.materia-tag{display:inline-block;background:#e0e7ff;color:#3730a3;border-radius:4px;padding:2px 7px;font-size:11px;margin:2px}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1><span class="logo-dot"></span> Gestionale DopoScuola</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('studenti')">Studenti</button>
    <button class="tab" onclick="switchTab('docenti')">Docenti</button>
    <button class="tab" onclick="switchTab('pianificazione')">Pianificazione</button>
    <button class="tab" onclick="switchTab('pagamenti')">Pagamenti</button>
    <button class="tab" onclick="switchTab('lezioni')">Lezioni</button>
  </div>
</div>

<div id="tab-studenti">
  <div id="view-lista">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Cerca per nome o cognome..." oninput="renderLista()">
      <select id="filtro-stato-stud" onchange="renderLista()">
        <option value="">Tutti</option><option value="1">Attivi</option><option value="0">Inattivi</option>
      </select>
      <button class="btn primary" onclick="openModal('nuovo-studente')"><i class="ti ti-plus"></i> Nuovo studente</button>
    </div>
    <div class="grid3" style="margin-bottom:1.25rem">
      <div class="metric-card"><div class="metric-label">Studenti totali</div><div class="metric-value" id="m-totale">0</div></div>
      <div class="metric-card"><div class="metric-label">Attivi</div><div class="metric-value" id="m-attivi">0</div></div>
      <div class="metric-card"><div class="metric-label">Entrate mensili stimate</div><div class="metric-value" id="m-entrate">€0</div></div>
    </div>
    <div class="card" style="padding:0 1.25rem"><div id="lista-studenti"></div></div>
  </div>
  <div id="view-dettaglio" style="display:none">
    <button class="detail-back" onclick="backToLista()"><i class="ti ti-arrow-left"></i> Tutti gli studenti</button>
    <div id="dettaglio-content"></div>
  </div>
</div>

<div id="tab-docenti" style="display:none">
  <div id="view-docenti-lista">
    <div class="search-wrap">
      <input type="text" id="search-docenti" placeholder="Cerca docente..." oninput="renderDocenti()">
      <button class="btn primary" onclick="openModal('nuovo-docente')"><i class="ti ti-plus"></i> Nuovo docente</button>
    </div>
    <div class="card" style="padding:0 1.25rem"><div id="lista-docenti"></div></div>
  </div>
  <div id="view-docente-dettaglio" style="display:none">
    <button class="detail-back" onclick="backToDocenti()"><i class="ti ti-arrow-left"></i> Tutti i docenti</button>
    <div id="docente-dettaglio-content"></div>
  </div>
</div>

<div id="tab-pianificazione" style="display:none">
  <div class="week-nav">
    <button class="btn" onclick="cambiaSettimana(-1)"><i class="ti ti-chevron-left"></i></button>
    <div class="week-label" id="week-label"></div>
    <button class="btn" onclick="cambiaSettimana(1)"><i class="ti ti-chevron-right"></i></button>
    <button class="btn" onclick="vaiOggi()">Oggi</button>
    <select id="filtro-docente-piano" onchange="renderPianificazione()" style="padding:8px 10px;border:1px solid #d4d2cc;border-radius:8px;font-size:13px;font-family:inherit;outline:none">
      <option value="">Tutti i docenti</option>
    </select>
    <button class="btn success" onclick="openModal('nuova-disponibilita')"><i class="ti ti-calendar-plus"></i> Disponibilità</button>
    <button class="btn primary" onclick="openModal('nuova-assegnazione')"><i class="ti ti-user-plus"></i> Assegna</button>
  </div>
  <div id="pianificazione-content"></div>
</div>

<div id="tab-pagamenti" style="display:none">
  <div class="search-wrap">
    <select id="filtro-mese" onchange="renderPagamenti()"></select>
    <select id="filtro-stato-pag" onchange="renderPagamenti()">
      <option value="">Tutti</option><option value="Pagato">Pagati</option><option value="In attesa">In attesa</option>
    </select>
    <button class="btn primary" onclick="openModal('nuovo-pagamento')"><i class="ti ti-plus"></i> Registra pagamento</button>
  </div>
  <div class="grid3" style="margin-bottom:1.25rem">
    <div class="metric-card"><div class="metric-label">Incassato</div><div class="metric-value" id="p-incassato">€0</div></div>
    <div class="metric-card"><div class="metric-label">Da incassare</div><div class="metric-value" id="p-da-incassare">€0</div></div>
    <div class="metric-card"><div class="metric-label">Studenti paganti</div><div class="metric-value" id="p-paganti">0</div></div>
  </div>
  <div class="card" style="padding:0 1.25rem"><div id="lista-pagamenti"></div></div>
</div>

<div id="tab-lezioni" style="display:none">
  <div class="search-wrap">
    <select id="filtro-studente-lez" onchange="renderLezioni()" style="flex:1">
      <option value="">Tutti gli studenti</option>
    </select>
    <input type="month" id="filtro-mese-lez" onchange="renderLezioni()">
    <button class="btn primary" onclick="openModal('nuova-lezione')"><i class="ti ti-plus"></i> Aggiungi lezione</button>
  </div>
  <div class="card" style="padding:0 1.25rem"><div id="lista-lezioni"></div></div>
</div>
</div>
<div id="modal-container"></div>
<script>
const PIANI=[{id:'5g',label:'5 giorni — 10h/sett',prezzo:220},{id:'4g',label:'4 giorni — 8h/sett',prezzo:180},{id:'3g',label:'3 giorni — 6h/sett',prezzo:135},{id:'2g',label:'2 giorni — 4h/sett',prezzo:90},{id:'ind',label:'Solo lezioni individuali',prezzo:0}];
const METODI=['Bonifico','PayPal','Postepay'];
const TUTTE_MATERIE=['Inglese','Economia e diritto','Economia aziendale','Tedesco','Matematica e Fisica','Francese','Spagnolo','Greco e Latino','Materie Umanistiche','Chimica e Biologia','Elettrotecnica','Elettronica, controlli automatici, Telecomunicazioni'];
const STATI_LEZ=['Tenuta','Da confermare','Assente'];
const GIORNI=['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì'];
const ORARI=['14:00','15:00','16:00','17:00','18:00','19:00','20:00'];
const MAX_ST=5;

let db={studenti:[],docenti:[],pagamenti:[],lezioni:[],disponibilita:[],assegnazioni:[],nextId:1};
let currentWeekStart=getMonday(new Date());

function getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-(day===0?6:day-1);return new Date(dt.setDate(diff));}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return new Date(d).toISOString().split('T')[0];}
function fmtDateIT(d){return new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});}
function weekKey(d){return fmtDate(getMonday(new Date(d)));}

function loadDb(){
  try{const r=localStorage.getItem('doposcuola-db');if(r){db=JSON.parse(r);}}catch(e){}
  if(!db.docenti)db.docenti=[];
  if(!db.disponibilita)db.disponibilita=[];
  if(!db.assegnazioni)db.assegnazioni=[];
  if(db.docenti.length===0){
    [{nome:'Famoso',cognome:'Stefano',materie:['Inglese','Tedesco','Economia e diritto','Economia aziendale']},{nome:'Di Bartolo',cognome:'Sofia',materie:['Matematica e Fisica']},{nome:'Irlando',cognome:'Daria',materie:['Chimica e Biologia']},{nome:'Muto',cognome:'Marilena',materie:['Materie Umanistiche','Greco e Latino']},{nome:'Donati',cognome:'Graziano',materie:['Matematica e Fisica','Elettrotecnica','Elettronica, controlli automatici, Telecomunicazioni']},{nome:'Stano',cognome:'Alessandra',materie:['Materie Umanistiche','Inglese']},{nome:'Polito',cognome:'Rita',materie:['Inglese','Francese','Spagnolo']},{nome:'La Rosa',cognome:'Federica',materie:['Materie Umanistiche']},{nome:'Parisi',cognome:'Marco',materie:['Matematica e Fisica']},{nome:'Spanu',cognome:'Claudia',materie:['Greco e Latino','Materie Umanistiche']},{nome:'Di Gesualdo',cognome:'Elena',materie:['Inglese','Tedesco']}].forEach(d=>db.docenti.push({...d,id:db.nextId++,attivo:true,email:'',telefono:'',note:''}));
    saveDb();
  }
  initMesi();
  const mi=document.getElementById('filtro-mese-lez');
  if(mi){const now=new Date();mi.value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;}
  renderAll();
}

function saveDb(){try{localStorage.setItem('doposcuola-db',JSON.stringify(db));}catch(e){}}
function renderAll(){renderLista();renderDocenti();renderPianificazione();renderPagamenti();renderLezioni();updateFiltroStudente();updateFiltroDocente();updateMetrics();}

function initMesi(){
  const sel=document.getElementById('filtro-mese');if(!sel)return;
  const mesi=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const now=new Date();sel.innerHTML='';
  for(let i=-3;i<=4;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);const val=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;const opt=document.createElement('option');opt.value=val;opt.textContent=`${mesi[d.getMonth()]} ${d.getFullYear()}`;if(i===0)opt.selected=true;sel.appendChild(opt);}
}

function initials(n,c){return((n||'')[0]||'').toUpperCase()+((c||'')[0]||'').toUpperCase();}
function avColor(id){return'av-'+(id%5);}

function updateMetrics(){
  const att=db.studenti.filter(s=>s.attivo!==false);
  document.getElementById('m-totale').textContent=db.studenti.length;
  document.getElementById('m-attivi').textContent=att.length;
  const ent=att.reduce((a,s)=>{const p=PIANI.find(x=>x.id===s.piano);return a+(p&&p.prezzo>0?p.prezzo:0);},0);
  document.getElementById('m-entrate').textContent='€'+ent;
}

function renderLista(){
  const q=(document.getElementById('search-input')||{}).value||'';
  const fs=(document.getElementById('filtro-stato-stud')||{}).value||'';
  const lista=document.getElementById('lista-studenti');if(!lista)return;
  const arr=db.studenti.filter(s=>(s.nome+' '+s.cognome).toLowerCase().includes(q.toLowerCase())&&(fs===''||String(s.attivo!==false?1:0)===fs));
  if(!arr.length){lista.innerHTML='<div class="empty">Nessuno studente trovato</div>';updateMetrics();return;}
  lista.innerHTML=arr.map(s=>{const p=PIANI.find(x=>x.id===s.piano);const stato=s.attivo===false?'<span class="badge gray">Inattivo</span>':'<span class="badge green">Attivo</span>';return`<div class="row-item" onclick="apriDettaglio(${s.id})"><div class="avatar ${avColor(s.id)}">${initials(s.nome,s.cognome)}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500">${s.nome} ${s.cognome}</div><div style="font-size:12px;color:#9b9a94">${p?p.label:'—'}</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0">${stato}<i class="ti ti-chevron-right" style="color:#9b9a94;font-size:16px"></i></div></div>`;}).join('');
  updateMetrics();
}

function apriDettaglio(id){
  const s=db.studenti.find(x=>x.id===id);if(!s)return;
  document.getElementById('view-lista').style.display='none';
  document.getElementById('view-dettaglio').style.display='block';
  const p=PIANI.find(x=>x.id===s.piano);
  const lezioni=db.lezioni.filter(l=>l.studenteId===id).slice().sort((a,b)=>b.data.localeCompare(a.data));
  const pagamenti=db.pagamenti.filter(x=>x.studenteId===id).slice().reverse();
  const totOre=lezioni.filter(l=>l.stato==='Tenuta').reduce((a,l)=>a+(l.durata||1),0);
  const lezHtml=lezioni.length?lezioni.slice(0,15).map(l=>`<div class="lez-row"><span style="color:#9b9a94;min-width:88px;font-size:12px">${l.data}</span><span style="flex:1">${l.materia}</span><span style="color:#9b9a94;font-size:12px">${l.docente||'—'}</span><span style="color:#9b9a94;font-size:12px">${l.orario||''}</span><span class="badge ${l.stato==='Tenuta'?'green':l.stato==='Assente'?'red':'amber'}">${l.stato}</span><button class="btn danger sm" onclick="event.stopPropagation();eliminaLezione(${l.id},${id})"><i class="ti ti-trash"></i></button></div>`).join(''):'<div class="empty">Nessuna lezione registrata</div>';
  const pagHtml=pagamenti.length?pagamenti.slice(0,8).map(pg=>`<div class="pag-row"><span style="color:#9b9a94;min-width:88px;font-size:12px">${pg.mese}</span><span style="flex:1">${pg.metodo}</span><span style="font-weight:600">€${pg.importo}</span><span class="badge ${pg.stato==='Pagato'?'green':'red'}">${pg.stato}</span><button class="btn danger sm" onclick="event.stopPropagation();eliminaPagamento(${pg.id},${id})"><i class="ti ti-trash"></i></button></div>`).join(''):'<div class="empty">Nessun pagamento registrato</div>';
  document.getElementById('dettaglio-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap">
      <div class="avatar ${avColor(s.id)}" style="width:48px;height:48px;font-size:16px">${initials(s.nome,s.cognome)}</div>
      <div style="flex:1"><div style="font-size:20px;font-weight:600">${s.nome} ${s.cognome}</div><div style="font-size:13px;color:#9b9a94">${p?p.label:'—'} · ${s.attivo===false?'<span class="badge gray">Inattivo</span>':'<span class="badge green">Attivo</span>'}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn" onclick="openModal('modifica-studente',${s.id})"><i class="ti ti-edit"></i> Modifica</button><button class="btn danger" onclick="eliminaStudente(${s.id})"><i class="ti ti-trash"></i></button></div>
    </div>
    <div class="grid3" style="margin-bottom:1.25rem">
      <div class="metric-card"><div class="metric-label">Ore totali tenute</div><div class="metric-value">${totOre}h</div></div>
      <div class="metric-card"><div class="metric-label">Canone mensile</div><div class="metric-value">${p&&p.prezzo>0?'€'+p.prezzo:'a lezione'}</div></div>
      <div class="metric-card"><div class="metric-label">Lezioni totali</div><div class="metric-value">${lezioni.length}</div></div>
    </div>
    <div class="card">
      <div class="section-title" style="margin-top:0">Anagrafica studente</div>
      <div class="grid2">
        <div><div class="metric-label">Email</div><div style="font-size:13px;margin-top:2px">${s.email||'—'}</div></div>
        <div><div class="metric-label">Telefono</div><div style="font-size:13px;margin-top:2px">${s.telefono||'—'}</div></div>
        <div><div class="metric-label">Data di nascita</div><div style="font-size:13px;margin-top:2px">${s.dataNascita||'—'}</div></div>
        <div><div class="metric-label">Codice fiscale</div><div style="font-size:13px;margin-top:2px">${s.cf||'—'}</div></div>
        <div><div class="metric-label">Indirizzo</div><div style="font-size:13px;margin-top:2px">${s.indirizzo||'—'}</div></div>
        <div><div class="metric-label">Data iscrizione</div><div style="font-size:13px;margin-top:2px">${s.dataIscrizione||'—'}</div></div>
      </div>
      <div class="section-title">Genitore / tutore</div>
      <div class="grid2">
        <div><div class="metric-label">Nome tutore</div><div style="font-size:13px;margin-top:2px">${s.tutoreNome||'—'}</div></div>
        <div><div class="metric-label">CF tutore</div><div style="font-size:13px;margin-top:2px;font-family:monospace">${s.tutoreCf||'—'}</div></div>
        <div><div class="metric-label">Email tutore</div><div style="font-size:13px;margin-top:2px">${s.tutoreEmail||'—'}</div></div>
        <div><div class="metric-label">Telefono tutore</div><div style="font-size:13px;margin-top:2px">${s.tutoreTel||'—'}</div></div>
      </div>

function cambiaSettimana(n){currentWeekStart=addDays(currentWeekStart,n*7);renderPianificazione();}

function renderPianificazione(){
  const wk=fmtDate(currentWeekStart);
  const filtroDoc=Number((document.getElementById('filtro-docente-piano')||{}).value)||null;
  const lbl=document.getElementById('week-label');
  if(lbl)lbl.textContent=`Settimana ${fmtDateIT(currentWeekStart)} — ${fmtDateIT(addDays(currentWeekStart,4))}`;
  const cont=document.getElementById('pianificazione-content');if(!cont)return;
  const docentiAttivi=db.docenti.filter(d=>d.attivo!==false&&(!filtroDoc||d.id===filtroDoc));
  if(!docentiAttivi.length){cont.innerHTML='<div class="empty">Nessun docente attivo</div>';return;}
  let html='';
  docentiAttivi.forEach(doc=>{
    const dispSett=db.disponibilita.filter(d=>d.docenteId===doc.id&&d.settimana===wk);
    html+=`<div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap"><div class="avatar ${avColor(doc.id)}" style="width:32px;height:32px;font-size:12px">${initials(doc.nome,doc.cognome)}</div><div style="font-weight:600;font-size:14px;flex:1">${doc.nome} ${doc.cognome}</div><button class="btn sm" onclick="openModal('nuova-disponibilita',${doc.id})"><i class="ti ti-calendar-plus"></i> Aggiungi slot</button></div>`;
    if(!dispSett.length){html+=`<div style="font-size:13px;color:#9b9a94;padding:4px 0">Nessuna disponibilità per questa settimana.</div>`;}
    else{
      GIORNI.forEach((giorno,gi)=>{
        const dataG=fmtDate(addDays(currentWeekStart,gi));
        const slots=dispSett.filter(d=>d.giorno===giorno);
        if(!slots.length)return;
        html+=`<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:600;color:#6b6a65;margin-bottom:4px">${giorno} ${dataG.split('-').slice(1).reverse().join('/')}</div>`;
        slots.forEach(slot=>{
          const ass=db.assegnazioni.filter(a=>a.disponibilitaId===slot.id);
          const n=ass.length;
          const colore=n>=MAX_ST?'red':n>=MAX_ST-1?'amber':'green';
          html+=`<div style="display:flex;align-items:center;gap:8px;background:#fafaf8;border-radius:8px;padding:8px 10px;margin-bottom:4px;flex-wrap:wrap">
            <span style="font-weight:500;min-width:100px">${slot.oraInizio}–${slot.oraFine}</span>
            <span style="color:#9b9a94;font-size:12px;flex:1">${(slot.materie||[]).join(', ')||'tutte le materie'}</span>
            <span class="badge ${colore}">${n}/${MAX_ST}</span>
            ${ass.map(a=>{const st=db.studenti.find(x=>x.id===a.studenteId);return st?`<span class="slot-chip" onclick="event.stopPropagation();rimuoviAssegnazione(${a.id})" title="Rimuovi ${st.nome} ${st.cognome}">${st.cognome} <i class="ti ti-x" style="font-size:10px"></i></span>`:''}).join('')}
            <button class="btn sm" onclick="openModal('nuova-assegnazione',${slot.id})"><i class="ti ti-user-plus"></i></button>
            <button class="btn danger sm" onclick="eliminaDisponibilita(${slot.id})"><i class="ti ti-trash"></i></button>
          </div>`;
        });
        html+='</div>';
      });
    }
    html+='</div>';
  });
  cont.innerHTML=html;
}

function renderPagamenti(){

        <div class="field"><label>Orario</label><input id="l-orario" placeholder="17:00 - 18:00"></div>
        <div class="field"><label>Materia *</label><select id="l-materia">${TUTTE_MATERIE.map(m=>`<option>${m}</option>`).join('')}</select></div>
        <div class="field"><label>Docente</label><select id="l-docente">${docOpt}</select></div>
        <div class="field"><label>Durata (ore)</label><input id="l-durata" type="number" value="1" min="0.5" step="0.5"></div>
        <div class="field"><label>Stato</label><select id="l-stato">${STATI_LEZ.map(s=>`<option>${s}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Note / argomenti</label><textarea id="l-note" placeholder="Es: equazioni di secondo grado..."></textarea></div>
      <div class="modal-footer"><button class="btn" onclick="closeModal()">Annulla</button><button class="btn primary" onclick="salvaLezione()">Aggiungi</button></div>
    </div></div>`;
  }
  mc.innerHTML=html;
  if(tipo==='nuova-assegnazione'&&arg)setTimeout(()=>aggiornaMaterieAss(),50);
  if(tipo==='nuova-disponibilita'&&arg)setTimeout(()=>aggiornaMaterieDisp(),50);
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

function aggiornaMaterieDisp(){
  const docId=Number((document.getElementById('disp-docente')||{}).value);
  const wrap=document.getElementById('disp-materie-wrap');if(!wrap)return;
  const doc=db.docenti.find(x=>x.id===docId);
  if(!doc){wrap.innerHTML='<div style="font-size:13px;color:#9b9a94">Seleziona prima un docente</div>';return;}
  wrap.innerHTML=(doc.materie||[]).map(m=>`<label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:4px"><input type="checkbox" class="disp-mat" value="${m}" checked> ${m}</label>`).join('');
}

function aggiornaMaterieAss(){
  const slotId=Number((document.getElementById('ass-slot')||{}).value);
  const sel=document.getElementById('ass-materia');if(!sel)return;
  const slot=db.disponibilita.find(x=>x.id===slotId);
  if(!slot){sel.innerHTML='<option value="">— seleziona slot prima —</option>';return;}
  const mat=slot.materie&&slot.materie.length?slot.materie:TUTTE_MATERIE;
  sel.innerHTML=mat.map(m=>`<option>${m}</option>`).join('');
}

function salvaStudente(id){
  const nome=document.getElementById('f-nome').value.trim();
  const cognome=document.getElementById('f-cognome').value.trim();
  if(!nome||!cognome){alert('Nome e cognome sono obbligatori');return;}
  const data={nome,cognome,email:document.getElementById('f-email').value.trim(),telefono:document.getElementById('f-tel').value.trim(),dataNascita:document.getElementById('f-nascita').value,cf:document.getElementById('f-cf').value.trim().toUpperCase(),indirizzo:document.getElementById('f-indirizzo').value.trim(),dataIscrizione:document.getElementById('f-iscrizione').value,tutoreNome:document.getElementById('f-tnome').value.trim(),tutoreCf:document.getElementById('f-tcf').value.trim().toUpperCase(),tutoreEmail:document.getElementById('f-temail').value.trim(),tutoreTel:document.getElementById('f-ttel').value.trim(),piano:document.getElementById('f-piano').value,attivo:document.getElementById('f-attivo').value==='1',note:document.getElementById('f-note').value.trim()};
  if(id!==null&&id!==undefined&&!isNaN(id)){const i=db.studenti.findIndex(s=>s.id===id);if(i>=0)db.studenti[i]={...db.studenti[i],...data};saveDb();closeModal();renderAll();apriDettaglio(id);}
  else{data.id=db.nextId++;db.studenti.push(data);saveDb();closeModal();renderAll();}
}

function salvaDocente(id){
  const nome=document.getElementById('fd-nome').value.trim();
  const cognome=document.getElementById('fd-cognome').value.trim();
  if(!nome||!cognome){alert('Nome e cognome sono obbligatori');return;}
  const materie=[...document.querySelectorAll('#fd-materie-wrap input:checked')].map(x=>x.value);
  const data={nome,cognome,email:document.getElementById('fd-email').value.trim(),telefono:document.getElementById('fd-tel').value.trim(),attivo:document.getElementById('fd-attivo').value==='1',materie,note:document.getElementById('fd-note').value.trim()};
  if(id!==null&&id!==undefined&&!isNaN(id)){const i=db.docenti.findIndex(d=>d.id===id);if(i>=0)db.docenti[i]={...db.docenti[i],...data};saveDb();closeModal();renderAll();apriDocenteDettaglio(id);}
  else{data.id=db.nextId++;db.docenti.push(data);saveDb();closeModal();renderAll();}
}

function salvaDisponibilita(){
  const docId=Number(document.getElementById('disp-docente').value);
  const giorno=document.getElementById('disp-giorno').value;
  const oraInizio=document.getElementById('disp-ora-inizio').value;
  const oraFine=document.getElementById('disp-ora-fine').value;
  const settimana=weekKey(document.getElementById('disp-settimana').value);
  if(!docId||!giorno||!oraInizio||!oraFine){alert('Compila tutti i campi obbligatori');return;}
  const materie=[...document.querySelectorAll('.disp-mat:checked')].map(x=>x.value);
  db.disponibilita.push({id:db.nextId++,docenteId:docId,giorno,oraInizio,oraFine,settimana,materie});
  saveDb();closeModal();renderPianificazione();
}

function salvaAssegnazione(){
  const slotId=Number(document.getElementById('ass-slot').value);
  const stId=Number(document.getElementById('ass-studente').value);
  const materia=document.getElementById('ass-materia').value;
  if(!slotId||!stId||!materia){alert('Compila tutti i campi');return;}
  const slot=db.disponibilita.find(x=>x.id===slotId);if(!slot){alert('Slot non trovato');return;}
  const nAss=db.assegnazioni.filter(a=>a.disponibilitaId===slotId).length;
  if(nAss>=MAX_ST){if(!confirm(`Questo slot ha già ${MAX_ST} studenti. Continuare?`))return;}
  if(db.assegnazioni.find(a=>a.disponibilitaId===slotId&&a.studenteId===stId)){alert('Questo studente è già assegnato a questo slot');return;}
  const doc=db.docenti.find(x=>x.id===slot.docenteId);
  db.assegnazioni.push({id:db.nextId++,disponibilitaId:slotId,studenteId:stId,materia,docente:doc?doc.nome+' '+doc.cognome:'',giorno:slot.giorno,oraInizio:slot.oraInizio,oraFine:slot.oraFine,settimana:slot.settimana});
  const gi=GIORNI.indexOf(slot.giorno);
  const dataLezione=fmtDate(addDays(currentWeekStart,gi));
  db.lezioni.push({id:db.nextId++,studenteId:stId,data:dataLezione,orario:`${slot.oraInizio}–${slot.oraFine}`,materia,docente:doc?doc.nome+' '+doc.cognome:'',durata:1,stato:'Da confermare',note:''});
  saveDb();closeModal();renderAll();
}

function rimuoviAssegnazione(id){
  if(!confirm('Rimuovere questo studente dallo slot?'))return;
  db.assegnazioni=db.assegnazioni.filter(a=>a.id!==id);
  saveDb();renderPianificazione();
}

function eliminaDisponibilita(id){
  if(!confirm('Eliminare questo slot? Verranno rimosse anche le assegnazioni collegate.'))return;
  db.disponibilita=db.disponibilita.filter(d=>d.id!==id);
  db.assegnazioni=db.assegnazioni.filter(a=>a.disponibilitaId!==id);
  saveDb();renderPianificazione();
}

function salvaPagamento(){
  const stId=Number(document.getElementById('p-studente').value);
  const importo=Number(document.getElementById('p-importo').value);
  if(!stId||!importo){alert('Seleziona uno studente e inserisci l\'importo');return;}
  db.pagamenti.push({id:db.nextId++,studenteId:stId,mese:document.getElementById('p-mese').value,importo,metodo:document.getElementById('p-metodo').value,stato:document.getElementById('p-stato').value,note:document.getElementById('p-note').value.trim()});
  saveDb();closeModal();renderAll();
}

function salvaLezione(){
  const stId=Number(document.getElementById('l-studente').value);
  const data=document.getElementById('l-data').value;
  const materia=document.getElementById('l-materia').value;
  if(!stId||!data||!materia){alert('Compila i campi obbligatori');return;}
  db.lezioni.push({id:db.nextId++,studenteId:stId,data,orario:document.getElementById('l-orario').value.trim(),materia,docente:document.getElementById('l-docente').value,durata:Number(document.getElementById('l-durata').value)||1,stato:document.getElementById('l-stato').value,note:document.getElementById('l-note').value.trim()});
  saveDb();closeModal();renderAll();
}

function autoImporto(){
  const sel=document.getElementById('p-studente');const imp=document.getElementById('p-importo');
  if(!sel||!imp)return;
  const s=db.studenti.find(x=>x.id===Number(sel.value));if(!s)return;
  const p=PIANI.find(x=>x.id===s.piano);if(p&&p.prezzo>0)imp.value=p.prezzo;
}

function eliminaStudente(id){
  if(!confirm('Eliminare questo studente e tutti i suoi dati?'))return;
  db.studenti=db.studenti.filter(s=>s.id!==id);
  db.pagamenti=db.pagamenti.filter(p=>p.studenteId!==id);
  db.lezioni=db.lezioni.filter(l=>l.studenteId!==id);
  db.assegnazioni=db.assegnazioni.filter(a=>a.studenteId!==id);
  saveDb();backToLista();
}
function eliminaDocente(id){if(!confirm('Eliminare questo docente?'))return;db.docenti=db.docenti.filter(d=>d.id!==id);saveDb();backToDocenti();}
function eliminaPagamento(id,stId){if(!confirm('Eliminare questo pagamento?'))return;db.pagamenti=db.pagamenti.filter(p=>p.id!==id);saveDb();if(stId)apriDettaglio(stId);else renderPagamenti();}
function eliminaLezione(id,stId){if(!confirm('Eliminare questa lezione?'))return;db.lezioni=db.lezioni.filter(l=>l.id!==id);saveDb();if(stId)apriDettaglio(stId);else renderLezioni();}

function switchTab(t){
  ['studenti','docenti','pianificazione','pagamenti','lezioni'].forEach(x=>{document.getElementById('tab-'+x).style.display=x===t?'block':'none';});
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['studenti','docenti','pianificazione','pagamenti','lezioni'][i]===t);});
  if(t==='pagamenti')renderPagamenti();
  if(t==='lezioni'){renderLezioni();updateFiltroStudente();}
  if(t==='pianificazione'){updateFiltroDocente();renderPianificazione();}
  if(t==='docenti')renderDocenti();
}

loadDb();
</script>
</body>
</html>
